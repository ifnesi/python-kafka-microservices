services:
  # Pizza Microservices - All-in-One Container
  # Runs all microservices and webapp in a single container
  pizza-app:
    build: .
    container_name: pizza-app
    command:
      - sh
      - -c
      - |
        python3 msvc_status.py cc_demo.ini default.ini &
        python3 msvc_assemble.py cc_demo.ini default.ini &
        python3 msvc_bake.py cc_demo.ini default.ini &
        python3 msvc_delivery.py cc_demo.ini default.ini &
        exec gunicorn 'webapp:main("cc_demo.ini", "default.ini")' --bind 0.0.0.0:8000 --workers 2 --timeout 120
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./pid:/app/pid
      - ./utils:/app/utils:ro
      - ./config_kafka:/app/config_kafka:ro
      - ./config_sys:/app/config_sys:ro
      - ./schemas:/app/schemas:ro
      - ./static:/app/static:ro
      - ./templates:/app/templates:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - pizza-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health-check"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  pizza-network:
    driver: bridge
